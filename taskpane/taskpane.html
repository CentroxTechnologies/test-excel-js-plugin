<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>PowerPair</title>

  <!-- Office.js must come from the CDN so the host can inject the Excel context. -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
  <header class="app-header">
    <div class="logo" aria-hidden="true">PP</div>
    <div class="title-block">
      <h1>PowerPair</h1>
      <p class="subtitle">Simple like ChatGPT. Accurate like a formula.</p>
    </div>
  </header>

  <!-- Mode banner: swapped between "Connected to Excel" and "Browser Preview" at runtime. -->
  <div id="mode-banner" class="mode-banner" hidden></div>

  <!-- Mock spreadsheet — only rendered in browser preview mode. Editable cells. -->
  <section id="mock-sheet-container" class="mock-sheet-container" hidden>
    <div class="mock-sheet-header">
      <span>Mock Spreadsheet</span>
      <span class="mock-sheet-hint">Click a cell to set active. Edit values inline.</span>
    </div>
    <div class="mock-sheet-scroll">
      <table id="mock-sheet" class="mock-sheet"></table>
    </div>
  </section>

  <section class="coming-soon-row" aria-label="Upcoming features">
    <button class="coming-btn" type="button" data-feature="workflow">
      <span class="badge">🚧</span> Save as Workflow
    </button>
    <button class="coming-btn" type="button" data-feature="schedule">
      <span class="badge">🚧</span> Schedule
    </button>
    <button class="coming-btn" type="button" data-feature="record">
      <span class="badge">🚧</span> Record Macro
    </button>
  </section>

  <main id="chat" class="chat" aria-live="polite"></main>

  <section class="suggestion-chips" id="suggestion-chips" aria-label="Quick prompts"></section>

  <footer class="input-bar">
    <textarea
      id="input"
      class="input"
      rows="1"
      placeholder="Try: build a quarterly budget"
      aria-label="Type a command"
    ></textarea>
    <button id="send" class="send" type="button" aria-label="Send">Send</button>
  </footer>

  <script src="taskpane.js"></script>
</body>
</html>
