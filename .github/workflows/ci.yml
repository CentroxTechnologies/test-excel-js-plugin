name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          cd backend
          python -m compileall -q .

      - name: Import smoke test
        env:
          AI_PROVIDER: openai
          OPENAI_API_KEY: dummy-key-for-import-test
        run: |
          cd backend
          python -c "import main, ai_engine, validator, models; print('imports ok')"

  addin:
    name: Add-in (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JS syntax check
        run: |
          node --check addin/src/taskpane/taskpane.js
          node --check addin/src/commands/commands.js

      - name: Manifest is well-formed XML
        run: |
          python -c "import xml.etree.ElementTree as ET; ET.parse('addin/manifest.xml'); print('manifest ok')"
